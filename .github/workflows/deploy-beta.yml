name: Deploy Beta to GitHub Pages

on:
  push:
    branches:
      - develop

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (beta)
        run: npm run build
        env:
          VITE_BASE_PATH: /otenki/beta/

      - name: Move dist to dist_beta
        run: mv dist dist_beta

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          clean: false

      - name: Install dependencies
        run: npm ci

      - name: Build (main)
        run: npm run build

      - name: Copy dist_beta to dist/beta
        run: cp -r dist_beta dist/beta

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
